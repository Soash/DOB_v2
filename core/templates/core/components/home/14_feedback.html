                    <!-- Dots generated by JS -->
                </div>

                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

<script>
const _testimonials = [
    { name: "Dr. Sarah Jenkins", role: "Senior Researcher", text: "\"This platform made my experience seamless and enjoyable. The quality of service exceeded my expectations!\"" },
    { name: "James Carter", role: "PhD Student", text: "\"The bioinformatics tools here are incredibly powerful. I completed my research project in half the time!\"" },
    { name: "Dr. Emily Chen", role: "Genomics Specialist", text: "\"Outstanding support team. They guided me through every step of my genomics analysis. Highly recommended!\"" },
    { name: "Michael Rossi", role: "Bioinformatician", text: "\"The molecular docking web app is a game-changer. No local setup needed \u2014 just results, instantly.\"" },
    { name: "Prof. Aisha Rahman", role: "University Lecturer", text: "\"As a student and educator, I found the learning resources and services extremely accessible and well-organised.\"" }
];

let _tIdx = 0;

function initTestimonials() {
    const dotsContainer = document.getElementById('testimonial-dots');
    if (!dotsContainer) return;
    dotsContainer.innerHTML = '';
    _testimonials.forEach((_, idx) => {
        const dot = document.createElement('button');
        dot.className = `w-2.5 h-2.5 rounded-full transition-all duration-300 ${idx === 0 ? 'bg-blue-600 w-8' : 'bg-gray-300 hover:bg-gray-400'}`;
        dot.onclick = () => testimonialGo(idx);
        dot.id = `t-dot-${idx}`;
        dotsContainer.appendChild(dot);
    });
}

function _renderTestimonial() {
    const elContent = document.getElementById('testimonial-content');
    const elText = document.getElementById('testimonial-text');
    const elName = document.getElementById('testimonial-name');
    const elRole = document.getElementById('testimonial-role');
    
    if (!elContent) return;
    
    elContent.style.opacity = '0';
    setTimeout(() => {
        elText.textContent = _testimonials[_tIdx].text;
        elName.textContent = _testimonials[_tIdx].name;
        elRole.textContent = _testimonials[_tIdx].role;
        elContent.style.opacity = '1';
        
        // Update dots
        _testimonials.forEach((_, idx) => {
            const dot = document.getElementById(`t-dot-${idx}`);
            if (dot) {
                if (idx === _tIdx) {
                    dot.className = 'w-8 h-2.5 rounded-full bg-blue-600 transition-all duration-300';
                } else {
                    dot.className = 'w-2.5 h-2.5 rounded-full bg-gray-300 hover:bg-gray-400 transition-all duration-300';
                }
            }
        });
    }, 300);
}

function testimonialNext() { _tIdx = (_tIdx + 1) % _testimonials.length; _renderTestimonial(); }
function testimonialPrev() { _tIdx = (_tIdx - 1 + _testimonials.length) % _testimonials.length; _renderTestimonial(); }
function testimonialGo(i)  { _tIdx = i; _renderTestimonial(); }

initTestimonials();
setInterval(testimonialNext, 6000);
</script>
