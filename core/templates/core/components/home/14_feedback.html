<!-- Feedback Section -->
<section class="py-24 bg-white relative">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <div class="bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-gray-100 p-8 md:p-12 relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-16 -right-16 w-48 h-48 bg-blue-50 rounded-full blur-2xl"></div>

            <div class="relative z-10">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-extrabold text-gray-900 mb-4">We value your Feedback</h2>
                    <p class="text-gray-600 text-lg">Help us improve our services and ecosystem.</p>
                </div>

                <form action="#" method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Name</label>
                            <input type="text" id="name" name="name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-colors outline-none bg-gray-50 focus:bg-white" placeholder="John Doe">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                            <input type="email" id="email" name="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-colors outline-none bg-gray-50 focus:bg-white" placeholder="john@example.com">
                        </div>
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-700 mb-2">Message</label>
                        <textarea id="message" name="message" rows="4" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-colors outline-none bg-gray-50 focus:bg-white resize-none" placeholder="Let us know what you think..."></textarea>
                    </div>
                    
                    <button type="button" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition-transform transform hover:-translate-y-1">
                        Submit Feedback
                    </button>
                </form>
            </div>
            
        </div>

    </div>
</section>
