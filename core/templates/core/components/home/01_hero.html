{% load static %}
<section class="bg-[#f8f9fa] py-16 md:py-24 lg:py-32 overflow-hidden font-sans">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 lg:grid-cols-2 gap-12 items-stretch">
        
        <div class="text-left flex flex-col items-start justify-center">
            <p class="text-gray-900 text-lg md:text-xl font-bold mb-2">
                Dawn of Bioinformatics Limited, Bangladesh
            </p>

            <h1 class="text-6xl md:text-7xl lg:text-[5.5rem] font-black text-black leading-[1.05] tracking-tight mb-8">
                <span class="block">1st</span>
                <span class="block text-[#245c98]">Bioinformatics</span>
                <span class="block">Company in</span>
                <span class="block">our Country</span>
            </h1>

            <div class="flex flex-row gap-4 mt-2">
                <a href="#about"
                    class="inline-flex items-center justify-center px-8 py-3.5 bg-[#2d3136] text-white text-sm font-semibold rounded hover:bg-[#1a1d20] transition-colors duration-300">
                    About Us
                </a>
                <a href="#"
                    class="inline-flex items-center justify-center px-8 py-3.5 bg-[#2d62a6] text-white text-sm font-semibold rounded hover:bg-[#20497e] transition-colors duration-300">
                    Explore More
                </a>
            </div>
        </div>

        <div class="w-full h-full flex items-center justify-center lg:justify-end mt-12 lg:mt-0">
            <div class="hero-float h-full flex items-center">
                <img src="{% static 'images/dob-ecosystem.png' %}" alt="DOB Ecosystem"
                    class="w-full h-full max-w-3xl object-contain">
            </div>
        </div>

    </div>
</section>

<style>
@keyframes heroFloat {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-14px); }
}
.hero-float {
    animation: heroFloat 5s ease-in-out infinite;
    will-change: transform;
}
</style>
