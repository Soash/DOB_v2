{% load static %}
<!-- Hero Section -->
<section
    class="relative pt-24 pb-28 lg:pt-36 lg:pb-40 overflow-hidden bg-gradient-to-br from-slate-900 via-indigo-950 to-blue-950">
    <!-- Abstract Background Shapes -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <svg class="absolute -top-24 -right-24 w-[32rem] h-[32rem] text-blue-500 opacity-20 animate-pulse mix-blend-screen"
            fill="currentColor" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="50"></circle>
        </svg>
        <svg class="absolute top-1/2 -left-32 w-[40rem] h-[40rem] text-indigo-500 opacity-20 mix-blend-screen rounded-full blur-[100px]"
            fill="currentColor" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="50"></circle>
        </svg>
        <div class="absolute inset-y-0 right-0 w-1/2 bg-gradient-to-l from-indigo-900/30 to-transparent blur-2xl"></div>
    </div>

    <div
        class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 z-10 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        <!-- Text Content (Left) -->
        <div class="text-left flex flex-col items-start justify-center">
            <!-- Glowing Badge -->
            <span
                class="inline-flex items-center gap-2 py-1.5 px-4 rounded-full bg-blue-500/20 text-blue-200 font-bold tracking-widest uppercase text-xs sm:text-sm auto-cols-auto mb-8 border border-blue-400/30 backdrop-blur-md shadow-sm">
                <span class="w-2 h-2 rounded-full bg-blue-400 animate-ping"></span>
                Dawn of Bioinformatics Limited, Bangladesh
            </span>

            <h1 class="text-4xl md:text-6xl lg:text-7xl font-extrabold text-white leading-tight mb-8 drop-shadow-lg">
                1st <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 animate-gradient-x">Bioinformatics</span>
                Company in <br class="hidden md:block" />
                our Country
            </h1>

            <div class="flex flex-col sm:flex-row gap-6 mt-4">
                <a href="#"
                    class="inline-flex items-center justify-center px-8 py-4 border border-transparent text-base font-bold rounded-2xl text-white bg-blue-600 hover:bg-blue-500 md:text-lg shadow-[0_10px_30px_rgba(37,99,235,0.3)] transition-all duration-300 transform hover:-translate-y-1">
                    Explore Services
                    <svg class="ml-2 -mr-1 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                    </svg>
                </a>
                <a href="#"
                    class="inline-flex items-center justify-center px-8 py-4 border border-blue-400/30 text-base font-bold rounded-2xl text-blue-100 bg-white/5 hover:bg-white/10 backdrop-blur-lg md:text-lg transition-all duration-300 transform hover:-translate-y-1">
                    Watch Intro Video
                    <svg class="ml-2 -mr-1 w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                            clip-rule="evenodd" />
                    </svg>
                </a>
            </div>
        </div>

        <!-- Image Content (Right) -->
        <div class="relative w-full flex justify-center lg:justify-end mt-12 lg:mt-0">
            <div
                class="relative w-full max-w-lg filter drop-shadow-[0_20px_50px_rgba(0,0,0,0.5)] hover:scale-105 transition-transform duration-500">
                <img src="{% static 'images/dob-ecosystem.png' %}" alt="DOB Ecosystem"
                    class="w-full h-auto object-contain z-10 relative">
                <!-- Decorative glow behind image -->
                <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full z-0 transform scale-90"></div>
            </div>
        </div>
    </div>

    <!-- Bottom fade transition -->
    <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-gray-900 to-transparent z-20"></div>
</section>
