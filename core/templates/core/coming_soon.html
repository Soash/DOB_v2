{% extends 'base.html' %}

{% block title %}Coming Soon | Dawn of Bioinformatics{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Background Decoration -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <svg class="absolute left-[50%] top-0 -translate-x-[50%] translate-y-[-20%] w-[1000px] text-blue-50 opacity-50" viewBox="0 0 1000 1000" fill="currentColor">
            <circle cx="500" cy="500" r="500" />
        </svg>
    </div>

    <div class="max-w-md w-full space-y-8 relative z-10 text-center">
        <div>
            <div class="mx-auto h-24 w-24 bg-blue-100 rounded-full flex items-center justify-center shadow-inner">
                <svg class="h-12 w-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
                </svg>
            </div>
            <h2 class="mt-8 text-center text-4xl font-extrabold text-blue-900 tracking-tight">
                Coming Soon
            </h2>
            <p class="mt-4 text-center text-lg text-gray-500">
                We're brewing up something exciting!
            </p>
            <p class="mt-2 text-center text-sm text-gray-400">
                This feature is currently under active development. Please check back later.
            </p>
        </div>

        <div class="mt-10">
            <a href="{% url 'core:home' %}" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-full text-white bg-blue-600 hover:bg-blue-700 shadow-md hover:shadow-lg transition-all duration-200 transform hover:-translate-y-0.5">
                <svg class="w-5 h-5 mr-2 -ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Return to Homepage
            </a>
        </div>
        
        <div class="mt-12 w-full max-w-xs mx-auto">
            <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                <div class="w-1/2 h-full bg-gradient-to-r from-blue-400 to-blue-600 rounded-full animate-pulse"></div>
            </div>
            <p class="text-xs text-gray-400 mt-2 font-medium tracking-wide">WORK IN PROGRESS</p>
        </div>
    </div>
</div>
{% endblock %}
